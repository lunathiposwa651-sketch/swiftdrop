<!DOCTYPE html>
<html>
<head>
<title>Swiftdrop Couriers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}
button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 10px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
.list {
  text-align: left;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>🚚 Swiftdrop Couriers</h1>
<p>King William’s Town & East London</p>

<a href="https://wa.me/27836153310">
<button>Chat on WhatsApp</button>
</a>

<!-- TRACK -->
<div class="card">
<h3>Track Parcel</h3>
<input id="trackInput" placeholder="Tracking Code">
<button onclick="trackParcel()">Track</button>
<p id="result"></p>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">

<h3>Add Parcel</h3>
<select id="status">
<option>Pending</option>
<option>Collected</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>
<button onclick="addParcel()">Generate & Save</button>

<h3>All Parcels</h3>
<div id="parcelList" class="list"></div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5",
  storageBucket: "swiftdrop-a8ea5.firebasestorage.app",
  messagingSenderId: "333632152751",
  appId: "1:333632152751:web:c1d8ec1d0a4ef68ba8e05a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login() {
  if(document.getElementById("pass").value === "1234"){
    document.getElementById("admin").style.display = "block";
    loadParcels();
  } else {
    alert("Wrong password");
  }
}

// AUTO CODE GENERATOR
function generateCode() {
  return "SW" + Math.floor(1000 + Math.random() * 9000);
}

// ADD PARCEL
function addParcel() {
  let code = generateCode();
  let status = document.getElementById("status").value;

  db.collection("parcels").doc(code).set({
    status: status,
    time: new Date().toLocaleString()
  });

  alert("Created: " + code);
  loadParcels();
}

// TRACK
function trackParcel() {
  let code = document.getElementById("trackInput").value;

  db.collection("parcels").doc(code).get().then(doc => {
    if(doc.exists){
      document.getElementById("result").innerText =
        doc.data().status + " (" + doc.data().time + ")";
    } else {
      document.getElementById("result").innerText = "Not found";
    }
  });
}

// LOAD ALL PARCELS
function loadParcels() {
  db.collection("parcels").get().then(snapshot => {
    let list = "";
    snapshot.forEach(doc => {
      let data = doc.data();
      list += `<p><b>${doc.id}</b> - ${data.status} (${data.time})</p>`;
    });
    document.getElementById("parcelList").innerHTML = list;
  });
}
</script>
