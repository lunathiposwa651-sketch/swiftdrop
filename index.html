<!DOCTYPE html>
<html>
<head>
<title>Swiftdrop Couriers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.container { padding: 20px; }
.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
}
button {
  padding: 12px;
  margin: 10px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 8px;
}
input, select {
  padding: 10px;
  margin: 10px;
  width: 90%;
}
</style>
</head>

<body>

<div class="container">

<h1>🚚 Swiftdrop Couriers</h1>
<p>King William’s Town & East London</p>

<a href="https://wa.me/27836153310">
<button>Chat on WhatsApp</button>
</a>

<!-- TRACK -->
<div class="card">
<h3>Track Parcel</h3>
<input id="trackInput" placeholder="Tracking Code">
<button onclick="trackParcel()">Track</button>
<p id="result"></p>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<input id="code" placeholder="Tracking Code">
<select id="status">
<option>Pending</option>
<option>Collected</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>
<button onclick="addParcel()">Save Parcel</button>
</div>
</div>

</div>

<script>
// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5",
  storageBucket: "swiftdrop-a8ea5.firebasestorage.app",
  messagingSenderId: "333632152751",
  appId: "1:333632152751:web:c1d8ec1d0a4ef68ba8e05a"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login() {
  if(document.getElementById("pass").value === "1234"){
    document.getElementById("admin").style.display = "block";
  }
}

// ADD PARCEL (SAVE ONLINE)
function addParcel() {
  let code = document.getElementById("code").value;
  let status = document.getElementById("status").value;

  db.collection("parcels").doc(code).set({
    status: status
  });

  alert("Saved online!");
}

// TRACK PARCEL (GET ONLINE)
function trackParcel() {
  let code = document.getElementById("trackInput").value;

  db.collection("parcels").doc(code).get().then(doc => {
    if(doc.exists){
      document.getElementById("result").innerText = doc.data().status;
    } else {
      document.getElementById("result").innerText = "Not found";
    }
  });
}
</script>

</body>
</html>
