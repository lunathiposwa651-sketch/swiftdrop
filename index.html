<!DOCTYPE html>
<html>
<head>
<title>Swiftdrop Couriers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}
button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 10px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
.price {
  font-size: 18px;
  margin-top: 10px;
  color: #22c55e;
}
</style>
</head>

<body>

<h1>🚚 Swiftdrop Couriers</h1>
<p>King William’s Town & East London</p>

<a href="https://wa.me/27836153310">
<button>Chat on WhatsApp</button>
</a>

<!-- TRACK -->
<div class="card">
<h3>Track Parcel</h3>
<input id="trackInput" placeholder="Tracking Code">
<button onclick="trackParcel()">Track</button>
<p id="result"></p>
</div>

<!-- PRICING -->
<div class="card">
<h3>Delivery Price</h3>

<select id="route">
<option value="50">KWT → East London (R50)</option>
<option value="50">East London → KWT (R50)</option>
<option value="30">Local Delivery (R30)</option>
</select>

<select id="size">
<option value="1">Small Parcel</option>
<option value="1.5">Medium Parcel</option>
<option value="2">Large Parcel</option>
</select>

<button onclick="calcPrice()">Calculate Price</button>
<p class="price" id="priceResult"></p>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">

<h3>Add Parcel</h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Customer Phone">

<select id="status">
<option>Pending</option>
<option>Collected</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="addParcel()">Generate & Save</button>

<h3>All Parcels</h3>
<div id="parcelList"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5",
  storageBucket: "swiftdrop-a8ea5.firebasestorage.app",
  messagingSenderId: "333632152751",
  appId: "1:333632152751:web:c1d8ec1d0a4ef68ba8e05a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.login = function() {
  if(document.getElementById("pass").value === "1234"){
    document.getElementById("admin").style.display = "block";
    loadParcels();
  } else {
    alert("Wrong password");
  }
}

// PRICE CALCULATOR
window.calcPrice = function() {
  let route = document.getElementById("route").value;
  let size = document.getElementById("size").value;

  let price = route * size;

  document.getElementById("priceResult").innerText = "Price: R" + price;
}

// GENERATE CODE
function generateCode() {
  return "SW" + Math.floor(1000 + Math.random() * 9000);
}

// ADD PARCEL
window.addParcel = async function() {
  let code = generateCode();
  let status = document.getElementById("status").value;
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  await setDoc(doc(db, "parcels", code), {
    status: status,
    name: name,
    phone: phone,
    time: new Date().toLocaleString()
  });

  alert("Created: " + code);
  loadParcels();
}

// TRACK
window.trackParcel = async function() {
  let code = document.getElementById("trackInput").value;

  const docRef = doc(db, "parcels", code);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let d = docSnap.data();
    document.getElementById("result").innerText =
      d.status + " | " + d.name + " | " + d.phone;
  } else {
    document.getElementById("result").innerText = "Not found";
  }
}

// LOAD PARCELS
async function loadParcels() {
  const querySnapshot = await getDocs(collection(db, "parcels"));
  let list = "";

  querySnapshot.forEach((docItem) => {
    let d = docItem.data();
    list += `<p><b>${docItem.id}</b> - ${d.name} - ${d.status}</p>`;
  });

  document.getElementById("parcelList").innerHTML = list;
}
</script>

</body>
</html>
