<!DOCTYPE html>
<html>
<head>
  <title>SwiftX Delivery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Manifest (for app install) -->
  <link rel="manifest" href="manifest.json">

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.doc = doc;
    window.updateDoc = updateDoc;
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #22c55e;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
    }

    #map {
      height: 300px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>⚡ SwiftX Delivery</h1>

  <h3>Request Pickup</h3>

  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="pickup" placeholder="Pickup Location">
  <input id="dropoff" placeholder="Drop-off Location">

  <button onclick="requestPickup()">Request</button>
</div>

<div id="map"></div>

<script>
  // MAP SETUP
  var map = L.map('map').setView([-33.0153, 27.9116], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // DRIVER MARKER
  var marker = L.marker([-33.0153, 27.9116])
    .addTo(map)
    .bindPopup("Driver")
    .openPopup();

  // REQUEST FUNCTION
  async function requestPickup() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let pickup = document.getElementById("pickup").value;
    let dropoff = document.getElementById("dropoff").value;

    await addDoc(collection(db, "parcels"), {
      name: name,
      phone: phone,
      pickup: pickup,
      dropoff: dropoff,
      status: "pending"
    });

    alert("Request Sent!");
  }

  // REAL GPS TRACKING
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(function(position) {

      var lat = position.coords.latitude;
      var lng = position.coords.longitude;

      // Move marker
      marker.setLatLng([lat, lng]);
      map.panTo([lat, lng]);

      // SAVE TO FIREBASE
      updateDoc(doc(db, "driver", "live"), {
        lat: lat,
        lng: lng
      });

    });
  }
</script>

<!-- Service Worker -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
