<!DOCTYPE html>
<html>
<head>
<title>SwiftX Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}
button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>⚡ SwiftX Delivery</h2>

<!-- BOOKING -->
<div class="card">
<h3>📦 Request Pickup</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="pickup" placeholder="Pickup">
<input id="dropoff" placeholder="Drop-off">

<button onclick="book()">Request</button>
<p id="msg"></p>
</div>

<!-- TRACK -->
<div class="card">
<h3>Track Parcel</h3>
<input id="track" placeholder="Tracking Code">
<button onclick="track()">Track</button>
<p id="result"></p>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin</h3>
<input id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>

<div id="adminPanel" style="display:none;">
<h4>Bookings</h4>
<div id="adminList"></div>
</div>
</div>

<!-- DRIVER -->
<div class="card">
<h3>Driver Panel</h3>
<input id="driverPass" placeholder="Driver Code">
<button onclick="driverLogin()">Enter</button>

<div id="driverPanel" style="display:none;">
<input id="parcelCode" placeholder="Tracking Code">

<select id="driverStatus">
<option>Collected</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="updateStatus()">Update Status</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// BOOKING
window.book = async function() {
  let id = "SX" + Math.floor(1000 + Math.random() * 9000);

  await setDoc(doc(db, "parcels", id), {
    name: name.value,
    phone: phone.value,
    pickup: pickup.value,
    dropoff: dropoff.value,
    status: "Pending"
  });

  msg.innerText = "Tracking Code: " + id;
}

// TRACK
window.track = async function() {
  const docSnap = await getDoc(doc(db, "parcels", track.value));
  if(docSnap.exists()){
    result.innerText = docSnap.data().status;
  } else {
    result.innerText = "Not found";
  }
}

// ADMIN
window.adminLogin = function() {
  if(adminPass.value === "1234"){
    adminPanel.style.display = "block";
    loadAdmin();
  }
}

async function loadAdmin(){
  const snap = await getDocs(collection(db, "parcels"));
  let list = "";
  snap.forEach(docItem=>{
    let d = docItem.data();
    list += `<p>${docItem.id} - ${d.name} (${d.status})</p>`;
  });
  adminList.innerHTML = list;
}

// DRIVER
window.driverLogin = function() {
  if(driverPass.value === "driver"){
    driverPanel.style.display = "block";
  }
}

// UPDATE STATUS
window.updateStatus = async function() {
  await updateDoc(doc(db, "parcels", parcelCode.value), {
    status: driverStatus.value
  });

  alert("Updated!");
}
</script>

</body>
</html>
