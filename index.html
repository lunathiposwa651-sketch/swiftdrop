<!DOCTYPE html>
<html>
<head>
<title>SwiftX Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  background: #020617;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* HERO */
.hero {
  padding: 40px 20px;
  text-align: center;
}
.hero h1 {
  font-size: 28px;
}
.hero p {
  color: #94a3b8;
}

/* BUTTON */
button {
  padding: 12px;
  margin-top: 10px;
  width: 90%;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 10px;
}

/* CARD */
.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}

/* INPUT */
input, select {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
}

/* LOGO */
.logo {
  font-size: 26px;
  color: #22c55e;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="header">
  <span class="logo">⚡ SwiftX Delivery</span>
</div>

<div class="hero">
  <h1>Fast & Reliable Courier Service</h1>
  <p>King William’s Town & East London</p>

  <a href="https://wa.me/27836153310?text=Hello%20SwiftX%20Delivery,%20I%20need%20a%20pickup">
    <button>📲 Book via WhatsApp</button>
  </a>
</div>

<!-- SERVICES -->
<div class="card">
  <h3>Our Services</h3>
  <p>🚚 Same-day delivery</p>
  <p>📦 Parcel tracking</p>
  <p>⚡ Fast local & intercity delivery</p>
</div>

<!-- TRACK -->
<div class="card">
  <h3>Track Parcel</h3>
  <input id="trackInput" placeholder="Enter Tracking Code">
  <button onclick="trackParcel()">Track</button>
  <p id="result"></p>
</div>

<!-- PRICING -->
<div class="card">
  <h3>Delivery Pricing</h3>

  <select id="route">
    <option value="50">KWT → East London (R50)</option>
    <option value="50">East London → KWT (R50)</option>
    <option value="30">Local Delivery (R30)</option>
  </select>

  <select id="size">
    <option value="1">Small Parcel</option>
    <option value="1.5">Medium Parcel</option>
    <option value="2">Large Parcel</option>
  </select>

  <button onclick="calcPrice()">Calculate</button>
  <p id="priceResult"></p>
</div>

<!-- ADMIN -->
<div class="card">
  <h3>Admin Login</h3>
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="admin" style="display:none;">
    <input id="name" placeholder="Customer Name">
    <input id="phone" placeholder="Customer Phone">

    <select id="status">
      <option>Pending</option>
      <option>Collected</option>
      <option>In Transit</option>
      <option>Out for Delivery</option>
      <option>Delivered</option>
    </select>

    <button onclick="addParcel()">Create Parcel</button>

    <div id="parcelList"></div>
  </div>
</div>

<div class="footer">
  © 2026 SwiftX Delivery
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5",
  storageBucket: "swiftdrop-a8ea5.firebasestorage.app",
  messagingSenderId: "333632152751",
  appId: "1:333632152751:web:c1d8ec1d0a4ef68ba8e05a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = function() {
  if(document.getElementById("pass").value === "1234"){
    document.getElementById("admin").style.display = "block";
    loadParcels();
  }
}

window.calcPrice = function() {
  let route = document.getElementById("route").value;
  let size = document.getElementById("size").value;
  document.getElementById("priceResult").innerText = "Price: R" + (route * size);
}

function generateCode() {
  return "SX" + Math.floor(1000 + Math.random() * 9000);
}

window.addParcel = async function() {
  let code = generateCode();
  let status = document.getElementById("status").value;
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  await setDoc(doc(db, "parcels", code), {
    status, name, phone,
    time: new Date().toLocaleString()
  });

  alert("Tracking Code: " + code);
  loadParcels();
}

window.trackParcel = async function() {
  let code = document.getElementById("trackInput").value;
  const docSnap = await getDoc(doc(db, "parcels", code));

  if (docSnap.exists()) {
    let d = docSnap.data();
    document.getElementById("result").innerText =
      d.status + " | " + d.name;
  } else {
    document.getElementById("result").innerText = "Not found";
  }
}

async function loadParcels() {
  const querySnapshot = await getDocs(collection(db, "parcels"));
  let list = "";
  querySnapshot.forEach(docItem => {
    let d = docItem.data();
    list += `<p><b>${docItem.id}</b> - ${d.name} - ${d.status}</p>`;
  });
  document.getElementById("parcelList").innerHTML = list;
}
</script>

</body>
</html>
