<!DOCTYPE html>
<html>
<head>
<title>SwiftX Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}
.header {
  padding: 20px;
  background: #020617;
  text-align: center;
  font-size: 22px;
}
.logo { color: #22c55e; }

.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}

button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <span class="logo">⚡ SwiftX Delivery</span>
</div>

<!-- BOOKING FORM -->
<div class="card">
<h3>📦 Request a Pickup</h3>

<input id="custName" placeholder="Your Name">
<input id="custPhone" placeholder="Your Phone">
<input id="pickup" placeholder="Pickup Location">
<input id="dropoff" placeholder="Drop-off Location">

<select id="parcelSize">
<option>Small Parcel</option>
<option>Medium Parcel</option>
<option>Large Parcel</option>
</select>

<button onclick="sendBooking()">Request Pickup</button>

<p id="bookingMsg"></p>
</div>

<!-- TRACK -->
<div class="card">
<h3>Track Parcel</h3>
<input id="trackInput" placeholder="Tracking Code">
<button onclick="trackParcel()">Track</button>
<p id="result"></p>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<h3>Bookings</h3>
<div id="bookingList"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQxGxPLT647onTJtLdMUSuRJ0l61ZF2n0",
  authDomain: "swiftdrop-a8ea5.firebaseapp.com",
  projectId: "swiftdrop-a8ea5",
  storageBucket: "swiftdrop-a8ea5.firebasestorage.app",
  messagingSenderId: "333632152751",
  appId: "1:333632152751:web:c1d8ec1d0a4ef68ba8e05a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SEND BOOKING
window.sendBooking = async function() {
  let name = document.getElementById("custName").value;
  let phone = document.getElementById("custPhone").value;
  let pickup = document.getElementById("pickup").value;
  let dropoff = document.getElementById("dropoff").value;
  let size = document.getElementById("parcelSize").value;

  let id = "BK" + Math.floor(1000 + Math.random() * 9000);

  await setDoc(doc(db, "bookings", id), {
    name, phone, pickup, dropoff, size,
    time: new Date().toLocaleString()
  });

  document.getElementById("bookingMsg").innerText =
    "Request sent! We will contact you soon.";

  // OPEN WHATSAPP WITH DETAILS
  let msg = `New Booking:
Name: ${name}
Phone: ${phone}
Pickup: ${pickup}
Drop-off: ${dropoff}
Size: ${size}`;

  window.open(`https://wa.me/27836153310?text=${encodeURIComponent(msg)}`);
}

// LOGIN
window.login = function() {
  if(document.getElementById("pass").value === "1234"){
    document.getElementById("admin").style.display = "block";
    loadBookings();
  }
}

// LOAD BOOKINGS
async function loadBookings() {
  const querySnapshot = await getDocs(collection(db, "bookings"));
  let list = "";

  querySnapshot.forEach(docItem => {
    let d = docItem.data();
    list += `<p><b>${docItem.id}</b> - ${d.name} (${d.pickup} → ${d.dropoff})</p>`;
  });

  document.getElementById("bookingList").innerHTML = list;
}

// TRACK
window.trackParcel = async function() {
  let code = document.getElementById("trackInput").value;
  const docSnap = await getDoc(doc(db, "parcels", code));

  if (docSnap.exists()) {
    let d = docSnap.data();
    document.getElementById("result").innerText = d.status;
  } else {
    document.getElementById("result").innerText = "Not found";
  }
}
</script>

</body>
</html>
